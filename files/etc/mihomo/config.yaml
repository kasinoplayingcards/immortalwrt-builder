port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxy-groups:

  - name: AI
    type: url-test
    proxies:
      - US
      - SG
      - JP
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: TikTok
    type: url-test
    proxies:
      - JP
      - SG
      - US
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: YouTube
    type: url-test
    proxies:
      - AUTO
      - SG
      - US
    url: http://www.gstatic.com/generate_204
    interval: 300

rules:
  - DOMAIN-SUFFIX,openai.com,AI
  - DOMAIN-SUFFIX,chatgpt.com,AI
  - DOMAIN-SUFFIX,gemini.google.com,AI

  - DOMAIN-SUFFIX,tiktok.com,TikTok
  - DOMAIN-SUFFIX,tiktokcdn.com,TikTok

  - DOMAIN-SUFFIX,youtube.com,YouTube
  - DOMAIN-SUFFIX,googlevideo.com,YouTube

  - GEOIP,CN,DIRECT
  - MATCH,AI
