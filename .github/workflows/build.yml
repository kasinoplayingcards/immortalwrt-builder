name: ImmortalWrt 24.10.6 Stable Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          docker run --rm \
            -v $PWD:/builder \
            -w /builder \
            ghcr.io/immortalwrt/imagebuilder:x86-64-24.10.6 \
            /bin/bash shell/build.sh

      - name: Upload firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immortalwrt-24.10.6
          files: bin/targets/x86/64/*img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
