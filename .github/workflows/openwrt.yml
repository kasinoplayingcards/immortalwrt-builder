name: OpenWrt Build Stable EFI

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10

  TZ: Asia/Shanghai

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        sudo docker image prune -af || true
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo apt-get update

        sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        python3-pip \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        cmake \
        ninja-build \
        ccache

    - name: Clone source
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

        cd openwrt

        ./scripts/feeds clean || true

        rm -rf tmp
        rm -rf staging_dir
        rm -rf build_dir

    - name: Copy custom files
      run: |
        cp .config openwrt/.config

        cp feeds.conf.default openwrt/feeds.conf.default

        chmod +x diy-part1.sh || true
        chmod +x diy-part2.sh || true

        cp diy-part1.sh openwrt/
        cp diy-part2.sh openwrt/

    - name: Update feeds
      run: |
        cd openwrt

        ./diy-part1.sh

        ./scripts/feeds update -a

        ./scripts/feeds install -a

        ./diy-part2.sh

    - name: Generate config
      run: |
        cd openwrt

        make defconfig

    - name: Download packages
      run: |
        cd openwrt

        make download -j8

    - name: Clean broken host cache
      run: |
        cd openwrt

        rm -rf build_dir/host/libtool-*
        rm -rf staging_dir/host

    - name: Compile firmware
      run: |
        cd openwrt

        make -j2 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-x86-64-EFI
        path: openwrt/bin/targets/
